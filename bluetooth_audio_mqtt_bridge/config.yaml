name: "Bluetooth Audio MQTT Bridge"
description: "Control multiple Bluetooth speakers via PulseAudio and MQTT"
version: "1.2.0"
slug: "bluetooth_audio_mqtt_bridge"
init: false
arch:
  - aarch64
  - armv7
  - amd64
host_network: true
services:
  - "mqtt:need"
audio: true
host_dbus: true
bluetooth: true
privileged:
  - SYS_ADMIN
homeassistant_api: true
hassio_api: true
hassio_role: admin
map:
  - "dbus:ro"

options:
  mqtt_base_topic: "btaudio2mqtt"
  poll_interval: 10
  auto_reconnect: true
  devices: []

schema:
  mqtt_base_topic: str
  poll_interval: int
  auto_reconnect: bool
  devices:
    - mac_address: str
      friendly_name: str
      auto_connect: bool
      reconnect_attempts: int
